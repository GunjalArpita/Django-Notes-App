{% extends 'base.html' %}

{% block title %}Update Note - Notes App{% endblock %}

{% block back_button %}
<div class="mb-3">
    <a href="{% url 'notes_list' %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Back to Notes</a>
</div>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow border-0 rounded-4 text-bg-body bg-body-tertiary">
            <div class="card-body p-5">
                <div class="text-center mb-5">
                    <i class="bi bi-pencil-square text-warning fs-1 mb-2"></i>
                    <h2 class="fw-bold text-warning">Update Note</h2>
                </div>
                
                {% if message %}
                    <div class="alert alert-info rounded-3 mb-4"><i class="bi bi-info-circle"></i> {{ message }}</div>
                {% endif %}
                
                <form method="post" autocomplete="off" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-4 text-start">
                        <label class="form-label fw-semibold fs-5"><i class="bi bi-tag"></i> Title</label>
                        <input type="text" name="title" class="form-control form-control-lg rounded-3" value="{{ note.title }}" required>
                    </div>
                    
                    <div class="mb-5 text-start">
                        <label class="form-label fw-semibold fs-5"><i class="bi bi-body-text"></i> Content</label>
                        <div class="input-group">
                            <textarea id="contentInput" name="content" class="form-control rounded-start-3" rows="8" required>{{ note.content }}</textarea>
                            <button type="button" class="btn btn-outline-primary rounded-end-3 d-flex align-items-center" id="micBtn" title="Speak your note">
                                <i class="bi bi-mic fs-4"></i>
                            </button>
                        </div>
                    </div>
                    
                    <!-- If we had file uploads for edit we'd show them here, currently the view limits it to title/content visually but let's keep it clean -->
                    
                    <div class="d-flex justify-content-end gap-3 pt-3 border-top">
                        <a href="{% url 'notes_list' %}" class="btn btn-light border px-4 py-2 fw-semibold rounded-pill">Cancel</a>
                        <button type="submit" class="btn btn-warning px-5 py-2 fw-semibold rounded-pill shadow-sm text-dark"><i class="bi bi-check2-circle"></i> Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    let recognizing = false;
    let recognition;
    const micBtn = document.getElementById('micBtn');
    const contentInput = document.getElementById('contentInput');
    
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'en-US';
        
        recognition.onresult = function(event) {
            const transcript = event.results[0][0].transcript;
            contentInput.value += (contentInput.value ? ' ' : '') + transcript;
        };
        
        recognition.onend = function() {
            recognizing = false;
            micBtn.classList.remove('btn-danger');
            micBtn.classList.add('btn-outline-primary');
            micBtn.innerHTML = '<i class="bi bi-mic fs-4"></i>';
        };
        
        micBtn.onclick = function() {
            if (!recognizing) {
                recognition.start();
                recognizing = true;
                micBtn.classList.remove('btn-outline-primary');
                micBtn.classList.add('btn-danger'); 
                micBtn.innerHTML = '<i class="bi bi-stop-circle fs-4"></i>';
            } else {
                recognition.stop();
            }
        };
    } else {
        micBtn.disabled = true;
        micBtn.title = 'Speech recognition not supported in this browser.';
    }
</script>
{% endblock %}
