{% extends 'base.html' %}

{% block title %}Secret Authentication - Notes App{% endblock %}

{% block back_button %}
<div class="mb-3">
    <a href="{% url 'notes_list' %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Back to Notes</a>
</div>
{% endblock %}

{% block content %}
<div class="row w-100 justify-content-center d-flex align-items-center" style="min-height: 60vh;">
    <div class="col-md-7 col-lg-5">
        <div class="card shadow-lg border-dark text-bg-body bg-body-tertiary" style="border-radius: 1.5rem;">
            <div class="card-body py-5 px-4 text-center">
                <i class="bi bi-shield-lock-fill text-dark" style="font-size: 3.5rem;"></i>
                <h2 class="fw-bold mb-4 mt-2">Secret Notes</h2>
                <p class="text-muted mb-4">Please enter your login password to access your secret notes.</p>
                
                <form method="post" autocomplete="off" action="{% url 'secrets_auth' %}">
                    {% csrf_token %}
                    <div class="mb-4 text-start">
                        <label class="form-label fw-semibold">Password <i class="bi bi-key-fill"></i></label>
                        <input type="password" name="secrets_password" class="form-control form-control-lg rounded-pill" placeholder="Enter password to unlock" required>
                    </div>
                    <button type="submit" class="btn btn-dark w-100 py-2 fw-bold text-white shadow" style="border-radius:1rem; font-size:1.1em;">
                        Unlock Secrets <i class="bi bi-unlock-fill"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
