{% extends 'base.html' %}

{% block title %}Edit Secret Note - Notes App{% endblock %}

{% block back_button %}
<div class="mb-3">
    <a href="{% url 'secrets_notes' %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Back to Secrets</a>
</div>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow border-dark text-bg-body bg-body-tertiary rounded-4">
            <div class="card-header bg-dark text-white p-4 rounded-top-4 text-center">
                <i class="bi bi-shield-lock-fill fs-1 text-warning mb-2 d-block"></i>
                <h2 class="fw-bold mb-0">Edit Secret Note</h2>
            </div>
            <div class="card-body p-4 p-md-5">
                {% if message %}
                    <div class="alert alert-info rounded-3 mb-4"><i class="bi bi-info-circle"></i> {{ message }}</div>
                {% endif %}
                
                <form method="post" autocomplete="off" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-4 text-start">
                        <label class="form-label fw-semibold fs-5"><i class="bi bi-tag"></i> Title</label>
                        <input type="text" name="title" class="form-control form-control-lg rounded-3" value="{{ note.title }}" required>
                    </div>
                    
                    <div class="mb-4 text-start">
                        <label class="form-label fw-semibold fs-5"><i class="bi bi-body-text"></i> Content</label>
                        <textarea name="content" class="form-control rounded-3" rows="8" required>{{ note.content }}</textarea>
                    </div>
                    
                    <div class="d-flex justify-content-end gap-3 pt-3 border-top">
                        <a href="{% url 'secrets_notes' %}" class="btn btn-light border px-4 py-2 fw-semibold rounded-pill">Cancel</a>
                        <button type="submit" class="btn btn-dark px-5 py-2 fw-semibold rounded-pill shadow-sm"><i class="bi bi-check2-circle"></i> Save Secret</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
