{% extends 'base.html' %}

{% block title %}Authentication Failed - Notes App{% endblock %}

{% block back_button %}
<div class="mb-3">
    <a href="{% url 'notes_list' %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Back to Notes</a>
</div>
{% endblock %}

{% block content %}
<div class="row w-100 justify-content-center d-flex align-items-center" style="min-height: 60vh;">
    <div class="col-md-7 col-lg-5">
        <div class="card shadow-lg border-danger text-bg-body bg-body-tertiary" style="border-radius: 1.5rem;">
            <div class="card-body py-5 px-4 text-center">
                <i class="bi bi-shield-x text-danger" style="font-size: 3.5rem;"></i>
                <h2 class="fw-bold mb-3 mt-2 text-danger">Authentication Failed</h2>
                <p class="text-muted mb-4 fs-5">Incorrect password. Access to secrets denied.</p>
                
                <a href="{% url 'secrets_auth' %}" class="btn btn-danger w-100 py-2 fw-bold text-white shadow" style="border-radius:1rem; font-size:1.1em;">
                    Try Again <i class="bi bi-arrow-clockwise"></i>
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
